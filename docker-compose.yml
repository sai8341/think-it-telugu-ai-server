version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  vps-backend:
    build: ./vps-backend
    container_name: vps-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL_NAME=qwen2.5:3b
      - INDEX_SECRET=${INDEX_SECRET:-thinkittelugu-secure-rag-key-2026}
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
